name: evaluation

on:
  pull_request:
    branches:
      - "**"

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          pip install -e .

      - name: Run evaluation pipeline
        run: python -m evaluation.pipeline --dataset evaluation/dataset/evaluation_dataset.json --results evaluation/results.json --threshold 0.80 --mode baseline

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results
          path: evaluation/results.json
