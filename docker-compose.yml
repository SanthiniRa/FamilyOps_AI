services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: familyops
      POSTGRES_USER: familyops
      POSTGRES_PASSWORD: familyops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.10.1
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: docker
      ENVIRONMENT: production
      DEBUG: "false"
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: postgresql+asyncpg://familyops:familyops@postgres:5432/familyops
      REDIS_URL: redis://redis:6379/0
      ENABLE_SHARED_RESILIENCE_REDIS: "true"
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - postgres
      - redis
      - qdrant
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    environment:
      PORT: 5000
      HOSTNAME: 0.0.0.0
    depends_on:
      - backend
    ports:
      - "5000:5000"

volumes:
  postgres_data:
  qdrant_data:
